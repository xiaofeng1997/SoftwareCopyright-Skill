tool_id: trae-cn
tool_name: Trae CN
tool_name_cn: Trae IDE 中文版

extends: _base.yaml

tool_specific:
  trae_cn:
    mcp_support: true
    terminal_mode: full
    file_watch: true
    tool_features:
      - mcp_servers
      - multi_agent
      - chinese_interface

screenshot_methods:
  available:
    - user_supplied
    - playwright
    - chrome_devtools
  recommended: user_supplied
  description: "Trae CN 推荐使用用户自行截图，或通过 playwright MCP 服务截图"
